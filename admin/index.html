<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KY Secret V3 · 管理员登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
body{background:#f7fafc;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;flex-direction:column}
.logo{font-size:3.5rem;font-weight:900;color:#000;letter-spacing:-0.02em;margin-bottom:1.5rem}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 14px rgba(0,20,40,.04);width:400px;max-width:100%;overflow:hidden;border:1px solid #ecf1f7}
.top{padding:32px 36px 0;text-align:center}
.top h1{font-size:18px;font-weight:700;color:#1a2a1a}
.top p{font-size:13px;color:#999;margin-top:4px}
.body{padding:28px 36px 36px}
.body label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:5px}
.body input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:0;transition:.15s;background:#fff;margin-bottom:16px}
.body input:focus{border-color:#1a7a3a;box-shadow:0 0 0 4px rgba(26,122,58,.06)}
.body .btn{width:100%;padding:13px;background:#1a7a3a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
.body .btn:hover{background:#15632f;box-shadow:0 4px 16px rgba(26,122,58,.2)}
.body .btn:active{transform:scale(.98)}
.body .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.body .err{display:none;margin-top:12px;padding:10px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;color:#dc2626;font-size:12px;text-align:center}
.body .load{display:none;text-align:center;color:#999;font-size:12px;margin-top:10px}
.body .load .sp{display:inline-block;width:14px;height:14px;border:2px solid #e2e8e0;border-top-color:#1a7a3a;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{text-align:center;padding:14px 20px;background:#f8fbf8;font-size:12px;color:#aaa;border-top:1px solid #eef3ee}
.foot a{color:#1a7a3a;text-decoration:none}
</style>
</head>
<body>
<div class="logo">KYSECRET</div>
<div class="card">
  <div class="top">
    <h1>管理员登录</h1>
    <p>管理系统 · 身份验证</p>
  </div>
  <div class="body">
    <label>用户名</label>
    <input type="text" id="u" placeholder="输入管理员用户名" autocomplete="off">
    <label>密码</label>
    <input type="password" id="p" placeholder="输入密码">
    <button class="btn" onclick="doLogin()" id="btn">登 录</button>
    <div class="err" id="err"></div>
    <div class="load" id="load"><span class="sp"></span>验证中...</div>
  </div>
  <div class="foot"><a href="../index.html">← 返回投稿页</a></div>
</div>
<script>
let BACKEND = '';

(async function(){try{const r=await fetch('https://raw.githubusercontent.com/QSNTH/KY-Secret-V3/refs/heads/main/config.json?t='+Date.now());const c=await r.json();BACKEND=(c.backend||'').trim()+c.api;}catch(e){try{const r=await fetch('/config.json');const c=await r.json();BACKEND=(c.backend||'').trim()+c.api;}catch(e2){}}})();

async function doLogin(){
  const u=document.getElementById('u').value,p=document.getElementById('p').value;
  const err=document.getElementById('err'),btn=document.getElementById('btn'),ld=document.getElementById('load');
  err.style.display='none';ld.style.display='none';
  if(!u||!p){err.textContent='请输入用户名和密码';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='';ld.style.display='block';
  try{
    const r=await fetch(BACKEND+'/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok||!d.ok){err.textContent=d.detail||'登录失败';err.style.display='block';btn.disabled=false;btn.textContent='登 录';ld.style.display='none';return;}
    localStorage.setItem('ky_token',d.token);
    location.href='dashborad.html';
  }catch(e){err.textContent='无法连接服务器，请检查后端是否运行';err.style.display='block';btn.disabled=false;btn.textContent='登 录';ld.style.display='none';}
}
document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>

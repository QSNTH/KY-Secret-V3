    <script>
    // ========= KY Secret V3 动态配置加载 =========
    window.KY_CONFIG = {
        backendUrl: '',
        apiPrefix: '/api',
        endpoints: {}
    };

    // 使用立即执行函数，保证配置在DOM加载前启动
    (async function initConfig() {
        // 先挂载 getUrl 工具函数（后面所有路径都会用到）
        window.KY_CONFIG.getUrl = function(endpoint, params = {}) {
            let path = window.KY_CONFIG.endpoints[endpoint];
            if (!path) path = endpoint.startsWith('/') ? endpoint : `/${endpoint}`;
            Object.keys(params).forEach(key => { path = path.replace(`{${key}}`, params[key]); });
            return `${window.KY_CONFIG.backendUrl}${window.KY_CONFIG.apiPrefix}${path}`;
        };

        // 如果通过 localhost 访问，直接读本地 config.json，跳过 GitHub
        if (location.hostname === '127.0.0.1' || location.hostname === 'localhost') {
            try {
                const localResponse = await fetch('/config.json');
                const localConfig = await localResponse.json();
                window.KY_CONFIG.backendUrl = (localConfig.backend || '').trim();
                window.KY_CONFIG.apiPrefix = localConfig.api || '/api';
                window.KY_CONFIG.endpoints = localConfig;
                console.log('✅ 本地配置加载成功');
                window.dispatchEvent(new CustomEvent('configLoaded', { detail: window.KY_CONFIG }));
                return;
            } catch (e) {
                console.warn('本地配置加载失败，尝试GitHub');
            }
        }
        try {
            // 尝试从GitHub加载
            const githubResponse = await fetch('https://raw.githubusercontent.com/QSNTH/KY-Secret-V3/refs/heads/main/config.json?t=' + Date.now());
            const githubConfig = await githubResponse.json();
            
            window.KY_CONFIG.backendUrl = githubConfig.backend || githubConfig.backendBaseUrl;
            window.KY_CONFIG.apiPrefix = githubConfig.api || '/api';
            window.KY_CONFIG.endpoints = githubConfig;
            
            console.log('✅ 配置加载成功:', window.KY_CONFIG.backendUrl);
        } catch (e) {
            console.warn('⚠️ GitHub配置加载失败，尝试本地配置...');
            
            try {
                const localResponse = await fetch('/config.json');
                const localConfig = await localResponse.json();
                
                window.KY_CONFIG.backendUrl = (localConfig.backend || '').trim();
                window.KY_CONFIG.apiPrefix = localConfig.api || '/api';
                window.KY_CONFIG.endpoints = localConfig;
                
                console.log('✅ 本地配置加载成功');
            } catch (e2) {
                console.warn('⚠️ 本地配置也失败，使用硬编码备份');
                
                window.KY_CONFIG.backendUrl = 'https://pvc-coins-productivity-dropped.trycloudflare.com';
                window.KY_CONFIG.apiPrefix = '/api';
                window.KY_CONFIG.endpoints = {
                    submit: '/submit',
                    lookup: '/lookup/{uuid}',
                    status: '/status',
                    admin_login: '/admin/login',
                    admin_logout: '/admin/logout',
                    admin_find: '/admin/find',
                    admin_review: '/admin/review',
                    admin_history: '/admin/history'
                };
            }
        }
        
        // 配置加载完成后触发表单可以提交
        window.dispatchEvent(new CustomEvent('configLoaded', { detail: window.KY_CONFIG }));
    })();
    </script>

 <script>
        (function() {
            "use strict";

            // DOM 元素
            const titleInput = document.getElementById('title');
            const contentInput = document.getElementById('content');
            const titleCounter = document.getElementById('titleCounter');
            const contentCounter = document.getElementById('contentCounter');
            const fileInput = document.getElementById('imageFiles');
            const fileHint = document.getElementById('fileCountHint');
            const previewContainer = document.getElementById('imagePreviewContainer');
            const form = document.getElementById('kySubmitForm');
            const contentRequired = document.getElementById('contentRequired');
            
            let isSubmitting = false;
            let currentPreviewFile = null;

            // 字数统计
            function updateTitleCounter() {
                titleCounter.innerText = `${titleInput.value.length}/80`;
            }
            
            function updateContentCounter() {
                contentCounter.innerText = `${contentInput.value.length}/200`;
                updateRequiredFields();
            }

            // 更新提示：标题必填，内容/图片选填
            function updateRequiredFields() {
                const hasTitle = titleInput.value.trim().length > 0;
                const hasContent = contentInput.value.trim().length > 0;
                document.getElementById('contentHint').textContent = hasTitle
                    ? (hasContent ? '✅ 标题 + 内容' : '✅ 标题已填，可选填内容')
                    : '✍️ 标题必填 · 内容选填';
            }

            titleInput.addEventListener('input', updateTitleCounter);
            contentInput.addEventListener('input', updateContentCounter);
            
            // 初始化
            updateTitleCounter();
            updateContentCounter();
            updateRequiredFields();

            // 图片预览（只允许1张）
            fileInput.addEventListener('change', function(e) {
                const files = Array.from(fileInput.files);
                
                if (files.length === 0) {
                    fileHint.innerText = '未选择任何文件';
                    previewContainer.innerHTML = '';
                    currentPreviewFile = null;
                    updateRequiredFields();
                    return;
                }

                // 只取第一张
                const file = files[0];
                
                // 如果选了多张，提示并只保留第一张
                if (files.length > 1) {
                    alert('只支持上传1张图片，已自动选择第一张');
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    fileInput.files = dt.files;
                }

                fileHint.innerText = `已选择 1 个文件: ${file.name}`;
                previewContainer.innerHTML = '';
                currentPreviewFile = file;

                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const previewItem = document.createElement('div');
                        previewItem.className = 'preview-item';
                        
                        const img = document.createElement('img');
                        img.src = ev.target.result;
                        
                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'remove-btn';
                        removeBtn.innerHTML = '×';
                        removeBtn.onclick = function() {
                            fileInput.value = '';
                            previewContainer.innerHTML = '';
                            fileHint.innerText = '未选择任何文件';
                            currentPreviewFile = null;
                            updateRequiredFields();
                        };
                        
                        previewItem.appendChild(img);
                        previewItem.appendChild(removeBtn);
                        previewContainer.appendChild(previewItem);
                    };
                    reader.readAsDataURL(file);
                }
                
                updateRequiredFields();
            });

    // ========== 🥷 开发者模式 ==========
    // F12 → Console → 输入 enableDevMode() 开启
    // 所有 fetch 请求及响应会在控制台输出
    window.enableDevMode = function() {
      localStorage.setItem('ky_dev_mode', 'true');
      const b = document.getElementById('devBadge');
      if (b) b.style.display = 'block';
      console.log('%c🥷 开发者模式已开启 · 所有 fetch 请求将被记录', 'background:#000;color:#0f0;padding:4px 8px;border-radius:4px');
    };
    window.disableDevMode = function() {
      localStorage.setItem('ky_dev_mode', 'false');
      const b = document.getElementById('devBadge');
      if (b) b.style.display = 'none';
      console.log('%c🥷 开发者模式已关闭', 'background:#000;color:#f00;padding:4px 8px;border-radius:4px');
    };
    window.toggleDevMode = function() {
      if (localStorage.getItem('ky_dev_mode') === 'true') window.disableDevMode();
      else window.enableDevMode();
    };

    // 初始化
    if (localStorage.getItem('ky_dev_mode') === 'true') {
      setTimeout(function() { window.enableDevMode(); }, 100);
    }

    // 拦截 fetch 记录日志
    const _origFetch = window.fetch;
    window.fetch = function() {
      if (localStorage.getItem('ky_dev_mode') === 'true') {
        const url = arguments[0], opts = arguments[1] || {};
        console.log(`[DEV] ➡ ${opts.method || 'GET'} ${url}`, opts.body instanceof FormData ? [...opts.body.entries()] : opts.body || '');
      }
      return _origFetch.apply(this, arguments).then(function(r) {
        if (localStorage.getItem('ky_dev_mode') === 'true') {
          const clone = r.clone();
          clone.text().then(function(t) { console.log(`[DEV] ⬅ ${r.status} ${r.url}`, t.substring(0, 300)); });
        }
        return r;
      });
    };

    // 浮动指示器
    const _devBadge = document.createElement('div');
    _devBadge.id = 'devBadge';
    _devBadge.style.cssText = 'display:none;position:fixed;bottom:8px;left:8px;background:#000;color:#0f0;font:11px monospace;padding:2px 6px;border-radius:4px;z-index:9999;pointer-events:none;opacity:.7';
    _devBadge.textContent = '🥷 DEV';
    document.body.appendChild(_devBadge);
    if (localStorage.getItem('ky_dev_mode') === 'true') _devBadge.style.display = 'block';

    // 开屏广告：从 config.json 读取 ad_delay（秒）控制弹出间隔，ad_link 控制跳转
    window.closeSplash = function() {
      var el=document.getElementById('splashOverlay');
      if(el)el.classList.add('hidden');
      try{localStorage.setItem('ky_splash_closed',Date.now().toString());}catch(e){}
    };
    (function(){
      var a=document.getElementById('splashLink');
      fetch('./config.json').then(function(r){return r.json()}).then(function(c){
        // 广告链接
        if(c.ad_link&&c.ad_link.trim()){a.href=c.ad_link.trim();}else{a.href='#';a.onclick=function(e){e.preventDefault();closeSplash();};}
        // 弹出延迟（秒），默认 1800s = 30min
        var delay=(parseInt(c.ad_delay)||1800)*1000;
        try{
          var last=localStorage.getItem('ky_splash_closed');
          if(last&&(Date.now()-parseInt(last)<delay)){
            document.getElementById('splashOverlay').classList.add('hidden');
          }
        }catch(e){}
      }).catch(function(){
        a.href='#';a.onclick=function(e){e.preventDefault();closeSplash();};
      });
      a.onclick=function(e){
        if(a.getAttribute('href')==='#'||!a.getAttribute('href')){
          e.preventDefault();closeSplash();
        }
      };
    })();

    // 等待配置加载完成再允许提交
    async function waitForConfig() {
                if (window.KY_CONFIG && window.KY_CONFIG.backendUrl) {
                    return true;
                }
                // 最多等待3秒
                for (let i = 0; i < 30; i++) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    if (window.KY_CONFIG && window.KY_CONFIG.backendUrl) {
                        return true;
                    }
                }
                return false;
            }

            // 表单提交（全局函数供 onclick 和 addEventListener 共用）
            window.handleSubmit = async function(e) {
                if (e) e.preventDefault();

                if (isSubmitting) return;
                
                const hasTitle = titleInput.value.trim().length > 0;
                const hasContent = contentInput.value.trim().length > 0;
                const hasImage = fileInput.files.length > 0;

                if (!hasTitle) {
                    alert('请填写标题（标题将生成在图片上）');
                    titleInput.focus();
                    return;
                }

                // 等待配置加载
                const configReady = await waitForConfig();
                if (!configReady) {
                    alert('配置加载失败，请刷新页面重试');
                    return;
                }

                // 构建 FormData
                const formData = new FormData();
                
                // 标题（选填）
                if (titleInput.value.trim()) {
                    formData.append('title', titleInput.value.trim());
                }
                
                // 内容（选填，不填则后端用标题生图）
                if (hasContent) {
                    formData.append('content', contentInput.value.trim());
                }

                // 标签（选填）
                const tagVal = document.getElementById('tag').value.trim();
                if (tagVal) formData.append('tag', tagVal);

                // 图片（最多1张）
                if (hasImage) {
                    formData.append('user_image', fileInput.files[0]);
                }

                // 使用动态配置构建URL
                const SUBMIT_ENDPOINT = window.KY_CONFIG.getUrl('submit');
                console.log('📤 提交到:', SUBMIT_ENDPOINT, 'FormData keys:', [...formData.keys()]);

                const submitBtn = document.querySelector('.submit-btn');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<span>⏳</span> 提交中...';
                submitBtn.disabled = true;
                isSubmitting = true;

                try {
                    const response = await fetch(SUBMIT_ENDPOINT, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error('后端返回错误:', response.status, errorText);
                        alert('❌ 提交失败 (HTTP ' + response.status + ')\n' + errorText);
                        return;
                    }

                    const data = await response.json();
                    const uuid = data.uuid || '';
                    const hid = data.hid || '';
                    // 跳转到结果页，带上 uuid 和 hid
                    window.location.href = 'result.html?uuid=' + encodeURIComponent(uuid) + '&hid=' + encodeURIComponent(hid);
                    
                } catch (error) {
                    console.error('提交失败:', error);
                    alert('❌ 投稿提交失败\nURL: ' + SUBMIT_ENDPOINT + '\n' + (error.message || error));
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    isSubmitting = false;
                }
            };
            form.addEventListener('submit', window.handleSubmit);

        })();
    </script>
</body>
</html>
